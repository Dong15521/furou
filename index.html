<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简生活助理 Pro</title>
    <style>
        /* Apple / Glassmorphism 风设计 */
        :root {
            --bg-color: #f5f5f7;
            --main-text: #1d1d1f;
            --light-text: #86868b;
            /* 渐变色 */
            --glass-bg: rgba(255, 255, 255, 0.7);
            --user-bubble-bg: linear-gradient(135deg, #e3e3e8 0%, #d2d2d7 100%);
            --accent-color: #007aff;
            --accent-gradient: linear-gradient(135deg, #007aff 0%, #00c6ff 100%);
            --border-color: rgba(0,0,0,0.1);
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(at 10% 10%, rgba(0, 122, 255, 0.05) 0px, transparent 50%),
                              radial-gradient(at 90% 90%, rgba(0, 198, 255, 0.05) 0px, transparent 50%);
            color: var(--main-text);
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* 毛玻璃效果基类 */
        .glass-effect {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* --- 左侧时间轴 (可折叠) --- */
        .timeline-container {
            width: 320px;
            height: 100%;
            background-color: #ffffff;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s ease;
            z-index: 100;
            flex-shrink: 0;
        }

        /* 折叠状态 */
        .timeline-container.collapsed {
            transform: translateX(-100%);
            width: 0;
        }

        .timeline-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timeline-title { font-size: 13px; font-weight: 600; color: var(--light-text); text-transform: uppercase; letter-spacing: 1px; }

        .close-btn { background: none; border: none; font-size: 20px; color: var(--light-text); cursor: pointer; padding: 0; }

        .timeline-content { flex: 1; overflow-y: auto; padding: 20px; }

        /* 时间轴项目样式升级 */
        .task-item { margin-bottom: 20px; padding-left: 18px; border-left: 2px solid #e3e3e8; position: relative; }
        .task-item::before { content: ''; position: absolute; left: -6px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background-color: #d2d2d7; transition: background 0.3s; }

        .task-item.active { border-left-color: var(--accent-color); }
        .task-item.active::before { background: var(--accent-gradient); box-shadow: 0 0 8px rgba(0,122,255,0.5); }

        .task-time { font-size: 11px; color: var(--light-text); margin-bottom: 4px; }
        .task-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
        .task-duration { font-size: 11px; color: var(--accent-color); font-weight: 500;}

        /* 子项目 (记录具体干了什么) */
        .sub-task-list { margin: 8px 0 0 10px; padding: 0; list-style: none; font-size: 13px; color: var(--main-text); border-left: 1px dashed #d2d2d7; padding-left: 10px; }
        .sub-task-item { margin-bottom: 4px; position: relative;}
        .sub-task-item::before { content: '-'; position: absolute; left: -8px; color: #d2d2d7; }


        /* --- 右侧对话区域 --- */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100%;
            transition: margin-left 0.3s ease;
        }

        /* 对话框顶部导航 (包含展开按钮) */
        .chat-nav {
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--border-color);
            position: absolute; top: 0; left: 0; right: 0; z-index: 90;
        }

        .menu-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--main-text); padding: 0; margin-right: 15px; }

        /* --- 开场大字提示语 --- */
        .greeting-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            z-index: 80;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .greeting-text {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--main-text);
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s ease forwards;
        }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        /* 提示语消融动画 */
        .greeting-overlay.melt-away {
            opacity: 0;
            visibility: hidden;
        }


        /* 对话历史 */
        .chat-history {
            flex: 1;
            padding: 80px 30px 100px 30px; /* 为顶部导航和底部输入框留出空间 */
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
        }

        /* 气泡样式升级 */
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.5;
            position: relative;
            animation: bubbleIn 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        @keyframes bubbleIn { from { opacity: 0; transform: translateY(10px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .msg-bot {
            background-color: #ffffff;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        .msg-user {
            background: var(--user-bubble-bg);
            align-self: flex-end;
            border-bottom-right-radius: 5px;
            color: #1d1d1f;
        }

        /* --- 底部输入区域 (毛玻璃) --- */
        .input-area {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 20px 30px;
            display: flex;
            gap: 12px;
            z-index: 90;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid var(--border-color);
            border-radius: 30px;
            font-size: 15px;
            outline: none;
            background: rgba(255,255,255,0.6);
            transition: all 0.2s;
        }

        input[type="text"]:focus {
            background: #ffffff;
            border-color: rgba(0,0,0,0.2);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        button.send-btn {
            padding: 0 20px;
            height: 44px;
            background: var(--accent-gradient);
            color: #ffffff;
            border: none;
            border-radius: 22px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            box-shadow: 0 2px 5px rgba(0,122,255,0.2);
        }

        button.send-btn:hover { opacity: 0.9; }

        /* 响应式：手机端侧边栏浮动 */
        @media (max-width: 768px) {
            .timeline-container { position: absolute; height: 100%; }
            .timeline-container.collapsed { transform: translateX(-100%); width: 320px; }
            .timeline-container:not(.collapsed) { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.1); }
        }
    </style>
</head>
<body>

    <div class="timeline-container glass-effect" id="sidebar">
        <div class="timeline-header">
            <div class="timeline-title">今日活动轨迹</div>
            <button class="close-btn" onclick="toggleSidebar()">×</button>
        </div>
        <div class="timeline-content" id="timeline">
            </div>
    </div>

    <div class="chat-container">
        <div class="chat-nav glass-effect">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <div style="font-size: 14px; font-weight: 600;">每日记录</div>
        </div>

        <div class="greeting-overlay" id="greetingOverlay">
            <div class="greeting-text">Hi，小景，开启人生中新的一天吧。</div>
        </div>

        <div class="chat-history" id="chatHistory">
            </div>

        <div class="input-area glass-effect">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="输入 '开始洗漱' 或直接描述..." autocomplete="off">
            </div>
            <button class="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        let tasks = []; // 存储任务对象，使用数组保持顺序
        let currentActiveTaskName = null; // 记录当前正在进行的任务主名称，用于挂载子项目
        let timerInterval;
        let isFirstMessage = true; // 标记是否是第一条消息

        // --- 交互逻辑 ---

        // 侧边栏折叠切换
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        // 获取当前时间 HH:MM
        function getTimeString() {
            const now = new Date();
            return now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        }

        // --- 核心记录逻辑 ---

        // 处理发送消息
        function sendMessage() {
            const inputEl = document.getElementById('userInput');
            const text = inputEl.value.trim();
            if (!text) return;

            // 1. 处理开场提示语消融
            if (isFirstMessage) {
                document.getElementById('greetingOverlay').classList.add('melt-away');
                isFirstMessage = false;
                // 提示语消融后，稍等片刻显示第一条模拟回复（可选）
            }

            // 2. 显示用户消息
            addMessageToChat(text, 'user');
            inputEl.value = '';

            // 3. 解析逻辑 (被动触发)
            setTimeout(() => {
                processUserText(text);
            }, 500);
        }

        function processUserText(text) {
            let botReply = "";
            let handled = false;

            // A. 判断是否是【开始】命令
            if (text.includes("开始")) {
                let taskName = text.split("开始")[1].replace(/了|吧|指令/g, '').trim();
                if(taskName) {
                    startNewTask(taskName);
                    botReply = `好的，已开始记录【${taskName}】。专注当下吧。`;
                    currentActiveTaskName = taskName; // 设置为当前活动任务
                    handled = true;
                }
            } 
            // B. 判断是否是【完成/结束】命令
            else if (text.includes("完成") || text.includes("结束")) {
                // 尝试提取任务名
                let taskName = text.replace(/我|已经|完成|结束|了/g, '').trim();
                
                // 如果用户只说了“完成了”，则尝试结束当前活动任务
                if((taskName === "" || text === taskName) && currentActiveTaskName) {
                    taskName = currentActiveTaskName;
                }

                if(taskName && isTaskItemActive(taskName)) {
                    endTaskItem(taskName);
                    botReply = `【${taskName}】已完成。做得好！`;
                    // 如果结束的是当前活动任务，清空标记
                    if(taskName === currentActiveTaskName) {
                        currentActiveTaskName = null;
                    }
                    handled = true;
                } else {
                    botReply = "目前好像没有这个事项在计时哦。";
                    handled = true;
                }
            }
            // C. 判断是否是【总结】
            else if (text.includes("总结")) {
                botReply = "今天辛苦了。每一分钟的努力都算数，早点休息，明天见。";
                // 停止所有
                tasks.forEach(t => t.active = false);
                currentActiveTaskName = null;
                handled = true;
            }

            // D. **子项目被动记录逻辑**
            // 如果上述关键词都没匹配到，且当前有一个正在活动的任务，则把这句话作为子项目添加
            if (!handled && currentActiveTaskName) {
                addSubTaskToActive(currentActiveTaskName, text);
                botReply = `已在【${currentActiveTaskName}】下记录：${text}`;
                handled = true;
            }

            // E. 如果什么都没触发（既没有活动任务，也不是指令）
            if (!handled) {
                botReply = "收到。想开始记录事项，可以说“开始洗漱”；想记录详情，请先开始一个事项。";
            }

            addMessageToChat(botReply, 'bot');
            renderTimeline();
        }

        // --- 内部数据操作 ---

        function startNewTask(name) {
            // 如果已有同名任务在进行，不重复创建
            if(isTaskItemActive(name)) return;

            tasks.push({
                name: name,
                startTime: Date.now(),
                timeStr: getTimeString(),
                active: true,
                duration: 0,
                subTasks: [] // 存放子项目描述
            });
            startGlobalTimer();
        }

        function isTaskItemActive(name) {
            return tasks.some(t => t.name === name && t.active);
        }

        function endTaskItem(name) {
            const task = tasks.find(t => t.name === name && t.active);
            if(task) {
                task.active = false;
                task.duration = Math.floor((Date.now() - task.startTime) / 60000);
            }
        }

        // 添加子项目详情
        function addSubTaskToActive(mainTaskName, detailText) {
            const task = tasks.find(t => t.name === mainTaskName && t.active);
            if(task) {
                task.subTasks.push(detailText);
            }
        }

        // 全局定时器（每分钟更新一次时长）
        function startGlobalTimer() {
            if(!timerInterval) {
                timerInterval = setInterval(() => {
                    let hasActive = false;
                    tasks.forEach(task => {
                        if(task.active) {
                            task.duration = Math.floor((Date.now() - task.startTime) / 60000);
                            hasActive = true;
                        }
                    });
                    renderTimeline();
                    if(!hasActive) {
                        clearInterval(timerInterval);
                        timerInterval = null;
                    }
                }, 60000);
            }
        }

        // --- 渲染 UI ---

        // 添加聊天气泡
        function addMessageToChat(text, sender) {
            const chatHistory = document.getElementById('chatHistory');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message msg-${sender}`;
            msgDiv.innerHTML = text;
            chatHistory.appendChild(msgDiv);
            
            // 滚动到底部
            setTimeout(() => {
                chatHistory.scrollTop = chatHistory.scrollHeight;
            }, 100);
        }

        // 渲染时间轴
        function renderTimeline() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';

            // 反转数组，让最新的任务在最上面
            [...tasks].reverse().forEach(task => {
                const itemDiv = document.createElement('div');
                itemDiv.className = `task-item ${task.active ? 'active' : ''}`;
                
                let durationText = task.active ? `已进行 ${task.duration} 分钟...` : `共耗时 ${task.duration} 分钟`;
                if(task.duration === 0) durationText = task.active ? "刚刚开始..." : "不到1分钟";

                // 生成子项目 HTML
                let subTaskHtml = '';
                if(task.subTasks && task.subTasks.length > 0) {
                    subTaskHtml = `<ul class="sub-task-list">`;
                    task.subTasks.forEach(st => {
                        subTaskHtml += `<li class="sub-task-item">${st}</li>`;
                    });
                    subTaskHtml += `</ul>`;
                }

                itemDiv.innerHTML = `
                    <div class="task-time">${task.timeStr}</div>
                    <div class="task-name">${task.name}</div>
                    <div class="task-duration">${durationText}</div>
                    ${subTaskHtml}
                `;
                timeline.appendChild(itemDiv);
            });
        }

        // 监听回车键
        document.getElementById('userInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });

        // 初始化：默认展开侧边栏（电脑端）
        if(window.innerWidth > 768) {
            document.getElementById('sidebar').classList.remove('collapsed');
        } else {
            document.getElementById('sidebar').classList.add('collapsed');
        }

    </script>
</body>
</html>
