<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简生活助理（测试版）</title>
    <style>
        /* Apple / MUJI 结合嫩绿主题 */
        :root {
            --bg-color: #f9fbf9; 
            --main-text: #2c3e2e; 
            --light-text: #8b998c;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --user-bubble-bg: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            --accent-color: #81c784; 
            --accent-gradient: linear-gradient(135deg, #a5d6a7 0%, #66bb6a 100%);
            --border-color: rgba(0,0,0,0.06);
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            background-color: var(--bg-color);
            color: var(--main-text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .glass-effect {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.4);
        }

        /* --- 左侧时间轴 (支持半折叠) --- */
        .timeline-container {
            width: 300px;
            height: 100%;
            background-color: #ffffff;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            flex-shrink: 0;
            overflow: hidden; /* 防止折叠时文字溢出 */
        }

        /* 迷你形态 (折叠后) */
        .timeline-container.collapsed { width: 70px; }
        .timeline-container.collapsed .timeline-title { opacity: 0; pointer-events: none; }
        .timeline-container.collapsed .task-name, 
        .timeline-container.collapsed .task-duration, 
        .timeline-container.collapsed .sub-task-list { display: none; }
        .timeline-container.collapsed .task-item { padding-left: 10px; margin-left: 10px; border-left: 2px solid #e8f5e9; }
        .timeline-container.collapsed .task-time { font-size: 11px; font-weight: 600; text-align: left; }

        .timeline-header { padding: 20px; border-bottom: 1px solid var(--border-color); min-width: 300px; }
        .timeline-title { font-size: 13px; font-weight: 600; color: var(--light-text); text-transform: uppercase; letter-spacing: 1px; transition: opacity 0.2s; }
        .timeline-content { flex: 1; overflow-y: auto; padding: 20px; min-width: 260px; }

        .task-item { margin-bottom: 20px; padding-left: 18px; border-left: 2px solid #e8f5e9; position: relative; transition: all 0.3s; }
        .task-item::before { content: ''; position: absolute; left: -6px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background-color: #c8e6c9; transition: background 0.3s; }
        .task-item.active { border-left-color: var(--accent-color); }
        .task-item.active::before { background: var(--accent-gradient); box-shadow: 0 0 8px rgba(129, 199, 132, 0.6); }

        .task-time { font-size: 11px; color: var(--light-text); margin-bottom: 4px; }
        .task-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
        .task-duration { font-size: 11px; color: var(--accent-color); font-weight: 500;}

        .sub-task-list { margin: 8px 0 0 10px; padding: 0; list-style: none; font-size: 13px; color: var(--main-text); border-left: 1px dashed #c8e6c9; padding-left: 10px; }
        .sub-task-item { margin-bottom: 4px; position: relative;}
        .sub-task-item::before { content: '-'; position: absolute; left: -8px; color: #a5d6a7; }

        /* --- 右侧对话区域 --- */
        .chat-container { flex: 1; display: flex; flex-direction: column; position: relative; height: 100%; min-width: 300px; }

        .chat-nav { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border-color); position: absolute; top: 0; left: 0; right: 0; z-index: 90; }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        
        .menu-btn { background: none; border: none; font-size: 18px; font-weight: bold; cursor: pointer; color: var(--main-text); width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .menu-btn:hover { background: rgba(0,0,0,0.05); }

        .history-btn { background: none; border: 1px solid var(--accent-color); color: var(--accent-color); padding: 6px 12px; border-radius: 16px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .history-btn:hover { background: var(--accent-color); color: white; }

        /* --- 开场覆盖层 (添加按钮和编辑名字) --- */
        .greeting-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--bg-color); z-index: 80;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .greeting-content { display: flex; flex-direction: column; align-items: center; gap: 40px; }

        .greeting-text { font-size: 32px; font-weight: 700; color: var(--main-text); opacity: 0; transform: translateY(20px); animation: fadeInUp 1s ease forwards; text-align: center;}
        
        #userName {
            border-bottom: 2px dashed rgba(129, 199, 132, 0.6);
            cursor: text; outline: none; transition: border-color 0.2s;
            display: inline-block; min-width: 40px; padding: 0 4px;
        }
        #userName:focus { border-bottom-style: solid; border-bottom-color: var(--accent-color); }

        .start-btn {
            padding: 12px 48px; background: var(--accent-gradient); color: #ffffff;
            border: none; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer;
            box-shadow: 0 4px 15px rgba(129, 199, 132, 0.3); opacity: 0; transform: translateY(20px);
            animation: fadeInUp 1s ease 0.5s forwards; transition: transform 0.2s, box-shadow 0.2s;
        }
        .start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(129, 199, 132, 0.5); }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .greeting-overlay.melt-away { opacity: 0; visibility: hidden; }

        /* --- 聊天记录区 --- */
        .chat-history { flex: 1; padding: 80px 30px 100px 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; scroll-behavior: smooth; }

        .message { max-width: 75%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.6; position: relative; animation: bubbleIn 0.3s cubic-bezier(0.1, 0.9, 0.2, 1); }
        @keyframes bubbleIn { from { opacity: 0; transform: translateY(10px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .msg-bot { background-color: #ffffff; align-self: flex-start; border-bottom-left-radius: 5px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .msg-user { background: var(--user-bubble-bg); align-self: flex-end; border-bottom-right-radius: 5px; color: #1a2e1a; font-weight: 500;}

        .input-area { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 30px; display: flex; gap: 12px; z-index: 90; }
        .input-wrapper { flex: 1; }
        input[type="text"] { width: 100%; padding: 14px 20px; border: 1px solid var(--border-color); border-radius: 30px; font-size: 15px; outline: none; background: rgba(255,255,255,0.8); transition: all 0.2s; box-sizing: border-box; }
        input[type="text"]:focus { background: #ffffff; box-shadow: 0 0 0 3px rgba(129, 199, 132, 0.2); border-color: transparent; }
        
        button.send-btn { padding: 0 24px; height: 48px; background: var(--accent-gradient); color: #ffffff; border: none; border-radius: 24px; font-size: 15px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 10px rgba(129, 199, 132, 0.3); transition: opacity 0.2s; }
        button.send-btn:hover { opacity: 0.85; }

        /* 手机端适配 */
        @media (max-width: 768px) {
            .timeline-container { position: absolute; }
            .timeline-container.collapsed { width: 0; border: none; } /* 手机上彻底隐藏，省空间 */
        }
    </style>
</head>
<body>

    <div class="timeline-container glass-effect" id="sidebar">
        <div class="timeline-header">
            <div class="timeline-title">今日活动轨迹</div>
        </div>
        <div class="timeline-content" id="timeline"></div>
    </div>

    <div class="chat-container">
        <div class="chat-nav glass-effect">
            <div class="nav-left">
                <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()">✕</button>
                <div id="headerTitle" style="font-size: 15px; font-weight: 600;">每日记录</div>
            </div>
            <button class="history-btn" onclick="showHistory()">历史记录</button>
        </div>

        <div class="greeting-overlay" id="greetingOverlay">
            <div class="greeting-content">
                <div class="greeting-text">Hi，<span id="userName" contenteditable="true" spellcheck="false" title="点击修改你的称呼">小景</span>，<br>开启人生中新的一天吧。</div>
                <button class="start-btn" onclick="enterChat()">开始</button>
            </div>
        </div>

        <div class="chat-history" id="chatHistory"></div>

        <div class="input-area glass-effect">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="发送指令或直接聊天..." autocomplete="off">
            </div>
            <button class="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        let tasks = []; 
        let currentActiveTaskName = null; 
        let timerInterval;

        window.onload = function() {
            // 读取名字
            const savedName = localStorage.getItem('lifeAssistantName') || '小景';
            document.getElementById('userName').innerText = savedName;

            const todayStr = new Date().toLocaleDateString();
            const savedData = JSON.parse(localStorage.getItem('lifeAssistantData')) || {};
            
            if(savedData[todayStr] && savedData[todayStr].length > 0) {
                tasks = savedData[todayStr];
                document.getElementById('greetingOverlay').style.display = 'none';
                document.getElementById('headerTitle').innerText = savedName + '的一天';
                
                // 找出当前进行中的任务
                const activeTask = tasks.find(t => t.active);
                if(activeTask) {
                    currentActiveTaskName = activeTask.name;
                    startGlobalTimer();
                }
                renderTimeline();
            }
            updateSidebarBtn();
        };

        // 阻止编辑名字时按回车换行
        document.getElementById('userName').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') { e.preventDefault(); this.blur(); }
        });

        // 点击开始按钮
        function enterChat() {
            const nameEl = document.getElementById('userName');
            let currentName = nameEl.innerText.trim() || '小景';
            localStorage.setItem('lifeAssistantName', currentName);
            
            document.getElementById('headerTitle').innerText = currentName + '的一天';
            document.getElementById('greetingOverlay').classList.add('melt-away');
            
            setTimeout(() => {
                document.getElementById('greetingOverlay').style.display = 'none';
                
                // 发送新手指引
                const rulesHtml = `欢迎进入 <strong>${currentName}的一天</strong>！🌿<br><br>
                为了让我更懂你，请参考以下规则：<br>
                <span style="color:#66bb6a;">▶</span> <strong>开启事项：</strong> 包含“开始”二字（如“吃午饭开始”）<br>
                <span style="color:#66bb6a;">▶</span> <strong>结束事项：</strong> 包含“结束/完成”，且最好带上事项名（如“午饭结束”）<br>
                <span style="color:#66bb6a;">▶</span> <strong>记录细节：</strong> 事项进行中，直接发送想记录的内容（如“吃了汉堡”）<br>
                <span style="color:#66bb6a;">▶</span> <strong>结束一天：</strong> 发送“总结”<br><br>
                准备好了吗？现在就发送你的第一个指令吧！`;
                addMessageToChat(rulesHtml, 'bot');
            }, 800);
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
            updateSidebarBtn();
        }

        function updateSidebarBtn() {
            const sidebar = document.getElementById('sidebar');
            const menuBtn = document.getElementById('menuBtn');
            menuBtn.innerText = sidebar.classList.contains('collapsed') ? '☰' : '✕';
        }

        function getTimeString() {
            const now = new Date();
            return now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        }

        function saveToLocal() {
            const todayStr = new Date().toLocaleDateString();
            const savedData = JSON.parse(localStorage.getItem('lifeAssistantData')) || {};
            savedData[todayStr] = tasks;
            localStorage.setItem('lifeAssistantData', JSON.stringify(savedData));
        }

        function sendMessage() {
            const inputEl = document.getElementById('userInput');
            const text = inputEl.value.trim();
            if (!text) return;

            addMessageToChat(text, 'user');
            inputEl.value = '';

            setTimeout(() => { processUserText(text); }, 400);
        }

        function processUserText(text) {
            let botReply = "";
            let handled = false;

            if (text.includes("开始")) {
                let taskName = text.replace(/我|已经|开始|了|吧|指令/g, '').trim();
                // 兼容"吃午饭开始"和"开始吃午饭"
                if(text.indexOf("开始") > 0) taskName = text.substring(0, text.indexOf("开始")).trim();
                
                if(taskName) {
                    startNewTask(taskName);
                    botReply = `好的，已开始记录【${taskName}】。专注当下吧。`;
                    currentActiveTaskName = taskName; 
                    handled = true;
                }
            } 
            else if (text.includes("完成") || text.includes("结束")) {
                let taskName = text.replace(/我|已经|完成|结束|了/g, '').trim();
                
                // 【核心升级：模糊匹配逻辑】
                // 如果用户没写清楚名字，或者名字只包含了一部分（比如用"午饭"匹配"吃午饭"）
                if((taskName === "" || text === taskName) && currentActiveTaskName) {
                    taskName = currentActiveTaskName;
                } else if (taskName && currentActiveTaskName) {
                    if(currentActiveTaskName.includes(taskName) || taskName.includes(currentActiveTaskName)) {
                        taskName = currentActiveTaskName;
                    }
                }

                if(taskName && isTaskItemActive(taskName)) {
                    endTaskItem(taskName);
                    botReply = `【${taskName}】已完成。做得好！`;
                    if(taskName === currentActiveTaskName) currentActiveTaskName = null;
                    handled = true;
                }
            }
            else if (text.includes("总结")) {
                tasks.forEach(t => {
                    if(t.active) { t.active = false; t.duration = Math.floor((Date.now() - t.startTime) / 60000); }
                });
                currentActiveTaskName = null;

                let summaryHtml = `<strong>📝 今日总结 (${new Date().toLocaleDateString()})</strong><br><br>`;
                if(tasks.length === 0) {
                    summaryHtml += "今天还没有记录任何事项哦。";
                } else {
                    tasks.forEach((t, index) => {
                        summaryHtml += `<strong>${index+1}. ${t.name}</strong> <span style="font-size:12px;color:#8b998c;">(${t.timeStr} 开始，共 ${t.duration} 分钟)</span><br>`;
                        if(t.subTasks && t.subTasks.length > 0) {
                            t.subTasks.forEach(st => { summaryHtml += `&nbsp;&nbsp;&nbsp;&nbsp;<span style="color:#66bb6a;">-</span> ${st}<br>`; });
                        }
                    });
                }
                summaryHtml += "<br>每一天微小的积累，都会在未来闪闪发光。早点休息，明天见。";
                botReply = summaryHtml;
                handled = true;
            }

            if (!handled && currentActiveTaskName) {
                addSubTaskToActive(currentActiveTaskName, text);
                botReply = `已在【${currentActiveTaskName}】下记录：${text}`;
                handled = true;
            }

            if (!handled) botReply = "收到。想让系统记录节点，别忘了带上“开始”或“结束”哦。";

            addMessageToChat(botReply, 'bot');
            renderTimeline();
            saveToLocal(); 
        }

        function showHistory() {
            const savedData = JSON.parse(localStorage.getItem('lifeAssistantData')) || {};
            const dates = Object.keys(savedData).filter(d => d !== new Date().toLocaleDateString());

            if(dates.length === 0) { addMessageToChat("你目前还没有过去的历史总结记录哦。", 'bot'); return; }

            let historyHtml = `<strong>📖 过去的日子</strong><br><br>`;
            dates.forEach(date => {
                const dayTasks = savedData[date];
                historyHtml += `<strong>${date}</strong>：记录了 ${dayTasks.length} 个事项<br>`;
                dayTasks.forEach(t => { historyHtml += `<span style="font-size:13px;color:#8b998c;">&nbsp;&nbsp;· ${t.name} (${t.duration}分钟)</span><br>`; });
                historyHtml += `<br>`;
            });
            historyHtml += `<span style="font-size:12px;color:#8b998c;">(历史数据安全保存在你当前的设备本地)</span>`;
            addMessageToChat(historyHtml, 'bot');
        }

        function startNewTask(name) {
            if(isTaskItemActive(name)) return;
            tasks.push({ name: name, startTime: Date.now(), timeStr: getTimeString(), active: true, duration: 0, subTasks: [] });
            startGlobalTimer();
        }

        function isTaskItemActive(name) { return tasks.some(t => t.name === name && t.active); }

        function endTaskItem(name) {
            const task = tasks.find(t => t.name === name && t.active);
            if(task) { task.active = false; task.duration = Math.floor((Date.now() - task.startTime) / 60000); }
        }

        function addSubTaskToActive(mainTaskName, detailText) {
            const task = tasks.find(t => t.name === mainTaskName && t.active);
            if(task) task.subTasks.push(detailText);
        }

        function startGlobalTimer() {
            if(!timerInterval) {
                timerInterval = setInterval(() => {
                    let hasActive = false;
                    tasks.forEach(task => {
                        if(task.active) { task.duration = Math.floor((Date.now() - task.startTime) / 60000); hasActive = true; }
                    });
                    renderTimeline();
                    saveToLocal();
                    if(!hasActive) { clearInterval(timerInterval); timerInterval = null; }
                }, 60000);
            }
        }

        function addMessageToChat(text, sender) {
            const chatHistory = document.getElementById('chatHistory');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message msg-${sender}`;
            msgDiv.innerHTML = text;
            chatHistory.appendChild(msgDiv);
            setTimeout(() => { chatHistory.scrollTop = chatHistory.scrollHeight; }, 100);
        }

        function renderTimeline() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';
            [...tasks].reverse().forEach(task => {
                const itemDiv = document.createElement('div');
                itemDiv.className = `task-item ${task.active ? 'active' : ''}`;
                let durationText = task.active ? `已进行 ${task.duration} 分钟...` : `共耗时 ${task.duration} 分钟`;
                if(task.duration === 0) durationText = task.active ? "刚刚开始..." : "不到1分钟";

                let subTaskHtml = '';
                if(task.subTasks && task.subTasks.length > 0) {
                    subTaskHtml = `<ul class="sub-task-list">`;
                    task.subTasks.forEach(st => { subTaskHtml += `<li class="sub-task-item">${st}</li>`; });
                    subTaskHtml += `</ul>`;
                }

                itemDiv.innerHTML = `<div class="task-time">${task.timeStr}</div><div class="task-name">${task.name}</div><div class="task-duration">${durationText}</div>${subTaskHtml}`;
                timeline.appendChild(itemDiv);
            });
        }

        document.getElementById('userInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });

        // 电脑端默认展开，手机端默认折叠隐藏
        if(window.innerWidth <= 768) {
            document.getElementById('sidebar').classList.add('collapsed');
            updateSidebarBtn();
        }
    </script>
</body>
</html>
