<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简生活助理 | 嫩绿清新型</title>
    <style>
        /* Apple / MUJI 结合嫩绿主题 */
        :root {
            --bg-color: #f9fbf9; /* 带有一点点极淡绿色的背景 */
            --main-text: #2c3e2e; /* 深墨绿色字体，比纯黑更柔和 */
            --light-text: #8b998c;
            /* 嫩绿色系 */
            --glass-bg: rgba(255, 255, 255, 0.75);
            --user-bubble-bg: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            --accent-color: #81c784; /* 核心嫩绿色 */
            --accent-gradient: linear-gradient(135deg, #a5d6a7 0%, #66bb6a 100%);
            --border-color: rgba(0,0,0,0.06);
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            background-color: var(--bg-color);
            color: var(--main-text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 毛玻璃效果 */
        .glass-effect {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.4);
        }

        /* --- 左侧时间轴 --- */
        .timeline-container {
            width: 320px;
            height: 100%;
            background-color: #ffffff;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s ease;
            z-index: 100;
            flex-shrink: 0;
        }

        .timeline-container.collapsed {
            transform: translateX(-100%);
            width: 0;
            border: none;
        }

        .timeline-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .timeline-title { font-size: 13px; font-weight: 600; color: var(--light-text); text-transform: uppercase; letter-spacing: 1px; }

        .timeline-content { flex: 1; overflow-y: auto; padding: 20px; }

        .task-item { margin-bottom: 20px; padding-left: 18px; border-left: 2px solid #e8f5e9; position: relative; }
        .task-item::before { content: ''; position: absolute; left: -6px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background-color: #c8e6c9; transition: background 0.3s; }

        .task-item.active { border-left-color: var(--accent-color); }
        .task-item.active::before { background: var(--accent-gradient); box-shadow: 0 0 8px rgba(129, 199, 132, 0.6); }

        .task-time { font-size: 11px; color: var(--light-text); margin-bottom: 4px; }
        .task-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
        .task-duration { font-size: 11px; color: var(--accent-color); font-weight: 500;}

        .sub-task-list { margin: 8px 0 0 10px; padding: 0; list-style: none; font-size: 13px; color: var(--main-text); border-left: 1px dashed #c8e6c9; padding-left: 10px; }
        .sub-task-item { margin-bottom: 4px; position: relative;}
        .sub-task-item::before { content: '-'; position: absolute; left: -8px; color: #a5d6a7; }

        /* --- 右侧对话区域 --- */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100%;
        }

        .chat-nav {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid var(--border-color);
            position: absolute; top: 0; left: 0; right: 0; z-index: 90;
        }

        .nav-left { display: flex; align-items: center; gap: 15px; }
        
        /* 改进的折叠按钮 */
        .menu-btn { 
            background: none; border: none; font-size: 18px; font-weight: bold; cursor: pointer; color: var(--main-text); 
            width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .menu-btn:hover { background: rgba(0,0,0,0.05); }

        .history-btn {
            background: none; border: 1px solid var(--accent-color); color: var(--accent-color);
            padding: 6px 12px; border-radius: 16px; font-size: 12px; cursor: pointer; transition: all 0.2s;
        }
        .history-btn:hover { background: var(--accent-color); color: white; }

        .greeting-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--bg-color); z-index: 80;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .greeting-text { font-size: 32px; font-weight: 700; color: var(--main-text); opacity: 0; transform: translateY(20px); animation: fadeInUp 1s ease forwards; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .greeting-overlay.melt-away { opacity: 0; visibility: hidden; }

        .chat-history { flex: 1; padding: 80px 30px 100px 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; scroll-behavior: smooth; }

        .message { max-width: 75%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.6; position: relative; animation: bubbleIn 0.3s cubic-bezier(0.1, 0.9, 0.2, 1); }
        @keyframes bubbleIn { from { opacity: 0; transform: translateY(10px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .msg-bot { background-color: #ffffff; align-self: flex-start; border-bottom-left-radius: 5px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .msg-user { background: var(--user-bubble-bg); align-self: flex-end; border-bottom-right-radius: 5px; color: #1a2e1a; font-weight: 500;}

        .input-area { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 30px; display: flex; gap: 12px; z-index: 90; }
        .input-wrapper { flex: 1; }
        
        input[type="text"] {
            width: 100%; padding: 14px 20px; border: 1px solid var(--border-color); border-radius: 30px;
            font-size: 15px; outline: none; background: rgba(255,255,255,0.8); transition: all 0.2s; box-sizing: border-box;
        }
        input[type="text"]:focus { background: #ffffff; box-shadow: 0 0 0 3px rgba(129, 199, 132, 0.2); border-color: transparent; }

        button.send-btn {
            padding: 0 24px; height: 48px; background: var(--accent-gradient); color: #ffffff; border: none;
            border-radius: 24px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
            box-shadow: 0 4px 10px rgba(129, 199, 132, 0.3);
        }
        button.send-btn:hover { opacity: 0.85; }

    </style>
</head>
<body>

    <div class="timeline-container glass-effect" id="sidebar">
        <div class="timeline-header">
            <div class="timeline-title">今日活动轨迹</div>
        </div>
        <div class="timeline-content" id="timeline"></div>
    </div>

    <div class="chat-container">
        <div class="chat-nav glass-effect">
            <div class="nav-left">
                <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()">✕</button>
                <div style="font-size: 14px; font-weight: 600;">每日记录</div>
            </div>
            <button class="history-btn" onclick="showHistory()">历史记录</button>
        </div>

        <div class="greeting-overlay" id="greetingOverlay">
            <div class="greeting-text">Hi，小景，开启人生中新的一天吧。</div>
        </div>

        <div class="chat-history" id="chatHistory"></div>

        <div class="input-area glass-effect">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="输入 '开始洗漱'、'洗漱完成' 或 '总结'..." autocomplete="off">
            </div>
            <button class="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        let tasks = []; 
        let currentActiveTaskName = null; 
        let timerInterval;
        let isFirstMessage = true; 

        // 页面加载时检查是否需要从本地恢复今天的数据
        window.onload = function() {
            const todayStr = new Date().toLocaleDateString();
            const savedData = JSON.parse(localStorage.getItem('lifeAssistantData')) || {};
            
            // 如果本地存了今天的数据，加载它
            if(savedData[todayStr]) {
                tasks = savedData[todayStr];
                // 如果有任务，隐藏开场动画
                if(tasks.length > 0) {
                    document.getElementById('greetingOverlay').classList.add('melt-away');
                    isFirstMessage = false;
                    renderTimeline();
                    // 重新启动仍在进行中的任务的定时器
                    if(tasks.some(t => t.active)) startGlobalTimer();
                }
            }
            updateSidebarBtn();
        };

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
            updateSidebarBtn();
        }

        function updateSidebarBtn() {
            const sidebar = document.getElementById('sidebar');
            const menuBtn = document.getElementById('menuBtn');
            menuBtn.innerText = sidebar.classList.contains('collapsed') ? '☰' : '✕';
        }

        function getTimeString() {
            const now = new Date();
            return now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        }

        // 保存当日数据到本地
        function saveToLocal() {
            const todayStr = new Date().toLocaleDateString();
            const savedData = JSON.parse(localStorage.getItem('lifeAssistantData')) || {};
            savedData[todayStr] = tasks;
            localStorage.setItem('lifeAssistantData', JSON.stringify(savedData));
        }

        function sendMessage() {
            const inputEl = document.getElementById('userInput');
            const text = inputEl.value.trim();
            if (!text) return;

            if (isFirstMessage) {
                document.getElementById('greetingOverlay').classList.add('melt-away');
                isFirstMessage = false;
            }

            addMessageToChat(text, 'user');
            inputEl.value = '';

            setTimeout(() => { processUserText(text); }, 400);
        }

        function processUserText(text) {
            let botReply = "";
            let handled = false;

            if (text.includes("开始")) {
                let taskName = text.split("开始")[1].replace(/了|吧|指令/g, '').trim();
                if(taskName) {
                    startNewTask(taskName);
                    botReply = `好的，已开始记录【${taskName}】。专注当下吧。`;
                    currentActiveTaskName = taskName; 
                    handled = true;
                }
            } 
            else if (text.includes("完成") || text.includes("结束")) {
                let taskName = text.replace(/我|已经|完成|结束|了/g, '').trim();
                if((taskName === "" || text === taskName) && currentActiveTaskName) taskName = currentActiveTaskName;

                if(taskName && isTaskItemActive(taskName)) {
                    endTaskItem(taskName);
                    botReply = `【${taskName}】已完成。做得好！`;
                    if(taskName === currentActiveTaskName) currentActiveTaskName = null;
                    handled = true;
                }
            }
            // 总结功能增强
            else if (text.includes("总结")) {
                tasks.forEach(t => {
                    if(t.active) { t.active = false; t.duration = Math.floor((Date.now() - t.startTime) / 60000); }
                });
                currentActiveTaskName = null;

                let summaryHtml = `<strong>📝 今日总结 (${new Date().toLocaleDateString()})</strong><br><br>`;
                if(tasks.length === 0) {
                    summaryHtml += "今天还没有记录任何事项哦。";
                } else {
                    tasks.forEach((t, index) => {
                        summaryHtml += `<strong>${index+1}. ${t.name}</strong> <span style="font-size:12px;color:#8b998c;">(${t.timeStr} 开始，共 ${t.duration} 分钟)</span><br>`;
                        if(t.subTasks && t.subTasks.length > 0) {
                            t.subTasks.forEach(st => { summaryHtml += `&nbsp;&nbsp;&nbsp;&nbsp;<span style="color:#66bb6a;">-</span> ${st}<br>`; });
                        }
                    });
                }
                summaryHtml += "<br>每一天微小的积累，都会在未来闪闪发光。早点休息，明天见。";
                botReply = summaryHtml;
                handled = true;
            }

            if (!handled && currentActiveTaskName) {
                addSubTaskToActive(currentActiveTaskName, text);
                botReply = `已在【${currentActiveTaskName}】下记录：${text}`;
                handled = true;
            }

            if (!handled) botReply = "收到。你可以说“开始[事项]”、“[事项]完成”，或输入“总结”。";

            addMessageToChat(botReply, 'bot');
            renderTimeline();
            saveToLocal(); // 每次交互后自动保存
        }

        // 历史记录查看功能
        function showHistory() {
            const savedData = JSON.parse(localStorage.getItem('lifeAssistantData')) || {};
            const dates = Object.keys(savedData).filter(d => d !== new Date().toLocaleDateString()); // 排除今天

            if(dates.length === 0) {
                addMessageToChat("你目前还没有过去的历史总结记录哦。", 'bot');
                return;
            }

            let historyHtml = `<strong>📖 过去的日子</strong><br><br>`;
            dates.forEach(date => {
                const dayTasks = savedData[date];
                historyHtml += `<strong>${date}</strong>：记录了 ${dayTasks.length} 个事项<br>`;
                dayTasks.forEach(t => {
                    historyHtml += `<span style="font-size:13px;color:#8b998c;">&nbsp;&nbsp;· ${t.name} (${t.duration}分钟)</span><br>`;
                });
                historyHtml += `<br>`;
            });
            historyHtml += `<span style="font-size:12px;color:#8b998c;">(历史数据安全保存在你当前的设备本地)</span>`;
            addMessageToChat(historyHtml, 'bot');
        }

        function startNewTask(name) {
            if(isTaskItemActive(name)) return;
            tasks.push({ name: name, startTime: Date.now(), timeStr: getTimeString(), active: true, duration: 0, subTasks: [] });
            startGlobalTimer();
        }

        function isTaskItemActive(name) { return tasks.some(t => t.name === name && t.active); }

        function endTaskItem(name) {
            const task = tasks.find(t => t.name === name && t.active);
            if(task) { task.active = false; task.duration = Math.floor((Date.now() - task.startTime) / 60000); }
        }

        function addSubTaskToActive(mainTaskName, detailText) {
            const task = tasks.find(t => t.name === mainTaskName && t.active);
            if(task) task.subTasks.push(detailText);
        }

        function startGlobalTimer() {
            if(!timerInterval) {
                timerInterval = setInterval(() => {
                    let hasActive = false;
                    tasks.forEach(task => {
                        if(task.active) { task.duration = Math.floor((Date.now() - task.startTime) / 60000); hasActive = true; }
                    });
                    renderTimeline();
                    saveToLocal();
                    if(!hasActive) { clearInterval(timerInterval); timerInterval = null; }
                }, 60000);
            }
        }

        function addMessageToChat(text, sender) {
            const chatHistory = document.getElementById('chatHistory');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message msg-${sender}`;
            msgDiv.innerHTML = text;
            chatHistory.appendChild(msgDiv);
            setTimeout(() => { chatHistory.scrollTop = chatHistory.scrollHeight; }, 100);
        }

        function renderTimeline() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';
            [...tasks].reverse().forEach(task => {
                const itemDiv = document.createElement('div');
                itemDiv.className = `task-item ${task.active ? 'active' : ''}`;
                let durationText = task.active ? `已进行 ${task.duration} 分钟...` : `共耗时 ${task.duration} 分钟`;
                if(task.duration === 0) durationText = task.active ? "刚刚开始..." : "不到1分钟";

                let subTaskHtml = '';
                if(task.subTasks && task.subTasks.length > 0) {
                    subTaskHtml = `<ul class="sub-task-list">`;
                    task.subTasks.forEach(st => { subTaskHtml += `<li class="sub-task-item">${st}</li>`; });
                    subTaskHtml += `</ul>`;
                }

                itemDiv.innerHTML = `<div class="task-time">${task.timeStr}</div><div class="task-name">${task.name}</div><div class="task-duration">${durationText}</div>${subTaskHtml}`;
                timeline.appendChild(itemDiv);
            });
        }

        document.getElementById('userInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });

        // 默认根据屏幕宽度处理侧边栏
        if(window.innerWidth <= 768) {
            document.getElementById('sidebar').classList.add('collapsed');
            updateSidebarBtn();
        }
    </script>
</body>
</html>
