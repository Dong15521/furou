<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简生活助理（测试版）</title>
    <style>
        /* Apple / MUJI 结合嫩绿主题 */
        :root {
            --bg-color: #f9fbf9; 
            --main-text: #2c3e2e; 
            --light-text: #8b998c;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --user-bubble-bg: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            --accent-color: #81c784; 
            --accent-gradient: linear-gradient(135deg, #a5d6a7 0%, #66bb6a 100%);
            --border-color: rgba(0,0,0,0.06);
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            background-color: var(--bg-color);
            color: var(--main-text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .glass-effect {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.4);
        }

        /* --- 左侧时间轴 (支持半折叠与全折叠) --- */
        .timeline-container {
            width: 300px;
            height: 100%;
            background-color: #ffffff;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            flex-shrink: 0;
            overflow: hidden;
        }

        /* 电脑端迷你形态 (折叠后) */
        .timeline-container.collapsed { width: 70px; }
        .timeline-container.collapsed .timeline-title { opacity: 0; pointer-events: none; }
        .timeline-container.collapsed .task-name, 
        .timeline-container.collapsed .task-duration, 
        .timeline-container.collapsed .sub-task-list { display: none; }
        .timeline-container.collapsed .task-item { padding-left: 10px; margin-left: 10px; border-left: 2px solid #e8f5e9; }
        .timeline-container.collapsed .task-time { font-size: 11px; font-weight: 600; text-align: left; }

        .timeline-header { padding: 20px; border-bottom: 1px solid var(--border-color); min-width: 300px; display: flex; justify-content: space-between; align-items: center;}
        .timeline-title { font-size: 13px; font-weight: 600; color: var(--light-text); text-transform: uppercase; letter-spacing: 1px; transition: opacity 0.2s; }
        
        /* 手机端专属关闭按钮 (默认隐藏) */
        .mobile-close-btn { display: none; background: none; border: none; font-size: 20px; color: var(--light-text); cursor: pointer; padding: 0 10px; }

        .timeline-content { flex: 1; overflow-y: auto; padding: 20px; min-width: 260px; scroll-behavior: smooth; }

        .task-item { margin-bottom: 20px; padding-left: 18px; border-left: 2px solid #e8f5e9; position: relative; transition: all 0.3s; animation: slideInLeft 0.3s ease;}
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        
        .task-item::before { content: ''; position: absolute; left: -6px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background-color: #c8e6c9; transition: background 0.3s; }
        .task-item.active { border-left-color: var(--accent-color); }
        .task-item.active::before { background: var(--accent-gradient); box-shadow: 0 0 8px rgba(129, 199, 132, 0.6); }

        .task-time { font-size: 11px; color: var(--light-text); margin-bottom: 4px; }
        .task-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
        .task-duration { font-size: 11px; color: var(--accent-color); font-weight: 500;}

        .sub-task-list { margin: 8px 0 0 10px; padding: 0; list-style: none; font-size: 13px; color: var(--main-text); border-left: 1px dashed #c8e6c9; padding-left: 10px; }
        .sub-task-item { margin-bottom: 4px; position: relative; animation: slideInLeft 0.2s ease;}
        .sub-task-item::before { content: '-'; position: absolute; left: -8px; color: #a5d6a7; }

        /* --- 右侧对话区域 --- */
        .chat-container { flex: 1; display: flex; flex-direction: column; position: relative; height: 100%; min-width: 300px; }

        .chat-nav { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border-color); position: absolute; top: 0; left: 0; right: 0; z-index: 90; }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        
        .menu-btn { background: none; border: none; font-size: 18px; font-weight: bold; cursor: pointer; color: var(--main-text); width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .menu-btn:hover { background: rgba(0,0,0,0.05); }

        .history-btn { background: none; border: 1px solid var(--accent-color); color: var(--accent-color); padding: 6px 12px; border-radius: 16px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .history-btn:hover { background: var(--accent-color); color: white; }

        /* --- 开场覆盖层 --- */
        .greeting-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--bg-color); z-index: 80;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .greeting-content { display: flex; flex-direction: column; align-items: center; gap: 40px; }
        .greeting-text { font-size: 32px; font-weight: 700; color: var(--main-text); opacity: 0; transform: translateY(20px); animation: fadeInUp 1s ease forwards; text-align: center;}
        
        #userName {
            border-bottom: 2px dashed rgba(129, 199, 132, 0.6);
            cursor: text; outline: none; transition: border-color 0.2s;
            display: inline-block; min-width: 40px; padding: 0 4px;
        }
        #userName:focus { border-bottom-style: solid; border-bottom-color: var(--accent-color); }

        .start-btn {
            padding: 12px 48px; background: var(--accent-gradient); color: #ffffff;
            border: none; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer;
            box-shadow: 0 4px 15px rgba(129, 199, 132, 0.3); opacity: 0; transform: translateY(20px);
            animation: fadeInUp 1s ease 0.5s forwards; transition: transform 0.2s, box-shadow 0.2s;
        }
        .start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(129, 199, 132, 0.5); }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .greeting-overlay.melt-away { opacity: 0; visibility: hidden; }

        /* --- 聊天记录区 --- */
        .chat-history { flex: 1; padding: 80px 30px 100px 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; scroll-behavior: smooth; }

        .message { max-width: 75%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.6; position: relative; animation: bubbleIn 0.3s cubic-bezier(0.1, 0.9, 0.2, 1); }
        @keyframes bubbleIn { from { opacity: 0; transform: translateY(10px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
